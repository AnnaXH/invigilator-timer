<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Invigilation Timer</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<h1>College Exam Invigilation Timer</h1>
<section class="setup">
  <div>
    Writing time: <input type="number" name="hours" id="total_writing_hours"> hr <input type="number" name="minutes" id="total_writing_minutes"> mins
  </div>
  <div>
    Rest time: <input type="number" name="hours" id="total_rest_hours"> hr <input type="number" name="minutes" id="total_rest_minutes"> mins
    <br>
    <input type="checkbox" id="unlimited_rest_time"> Unlimited Rest Time
  </div>
  <button class = "button" id="set_time">Set time</button>
  <button class = "button" id="pause">Start</button>

</section>

<section class="time">
  <h2>Current Time</h2>
  <div class="time_display" id="current_time">
      <div class="clock_box">
        <p class="clock_time" id="current_hours"></p>
      </div>
      <p class="dots">:</p>
      <div class="clock_box">
        <p class="clock_time" id="current_minutes"></p>
      </div>
      <p class="dots">:</p>
      <div class="clock_box">
        <p class="clock_time" id="current_seconds"></p>
    </div>
  </div>
</section>

<section class="timers">
  <div class="timer_block current" id="writing_time">
    <div class="title-row">
      <h2 id="writing_header">Writing Time Remaining</h2>
      <button id="writing_switch">Show Used</button>
    </div>
    <div class="time_display">
      <div class="counter_box">
        <p class="counter_time" id="writing_hours">00</p>
      </div>
      <p class="dots">:</p>
      <div class="counter_box ">
        <p class="counter_time" id="writing_minutes">00</p>
      </div>
      <p class="dots">:</p>
      <div class="counter_box ">
        <p class="counter_time" id="writing_seconds">00</p>
      </div>
    </div>

  </div>

  <div class="timer_block" id="rest_time">
    <div class="title-row">
      <h2 id="rest_header">Rest Time Remaining</h2>
      <button id="rest_switch">Show Used</button>
    </div>    <div class="time_display">
      <div class="counter_box ">
        <p class="counter_time" id="rest_hours">00</p>
      </div>
      <p class="dots">:</p>
      <div class="counter_box ">
        <p class="counter_time" id="rest_minutes">00</p>
      </div>
      <p class="dots">:</p>
      <div class="counter_box ">
        <p class="counter_time" id="rest_seconds">00</p>
      </div>
    </div>

  </div>
<button class = "button" disabled= "" id="switch">Change to rest / writing</button>
</section>

<section class="time">
  <h2>End Time</h2>
  <div class="time_display" id="end_time">
      <div class="clock_box ">
        <p class="clock_time" id="end_hours"></p>
      </div>
      <p class="dots">:</p>
      <div class="clock_box ">
        <p class="clock_time" id="end_minutes"></p>
      </div>
      <p class="dots">:</p>
      <div class="clock_box ">
        <p class="clock_time" id="end_seconds"></p>
    </div>
  </div>

</section>
<section class="script">
  <h2>Exam log</h2>
  <p>Enter notes here</p>
  <input type="text">
  <button class = "button" disabled= "" id="generate_log">Generate Exam Log</button>

</section>
<!-- partial -->
  <script  src="./timer_script.js"></script>

</body>
</html>
